[build]
  base = "frontend"
    command = "npm run build"
      publish = "build"

      # Redirect API calls to backend on Render
      [[redirects]]
        from = "/api/*"
          to = "https://tech-news-blog-l67l.onrender.com/api/:splat"
            status = 200
              force = true

              # SPA fallback - send all routes to index.html
              [[redirects]]
                from = "/*"
                  to = "/index.html"
                    status = 200
